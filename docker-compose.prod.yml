services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-1440}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - RUNPOD_BASE_URL=${RUNPOD_BASE_URL:-https://api.runpod.ai/v2}
      - PADDLE_API_KEY=${PADDLE_API_KEY:-}
      - PADDLE_WEBHOOK_SECRET=${PADDLE_WEBHOOK_SECRET:-}
      - PADDLE_ENVIRONMENT=${PADDLE_ENVIRONMENT:-sandbox}
    networks:
      - dokploy-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  scout:
    build:
      context: ./scout
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - SCOUT_INTERVAL_HOURS=${SCOUT_INTERVAL_HOURS:-2}
      - SCOUT_AUTO_DEPLOY_MIN_DOWNLOADS=${SCOUT_AUTO_DEPLOY_MIN_DOWNLOADS:-1000}
      - SCOUT_AUTO_DEPLOY_MIN_LIKES=${SCOUT_AUTO_DEPLOY_MIN_LIKES:-20}
      - SCOUT_MIN_DOWNLOADS=${SCOUT_MIN_DOWNLOADS:-100}
      - SCOUT_MIN_LIKES=${SCOUT_MIN_LIKES:-5}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    networks:
      - dokploy-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3010}:3000"
    environment:
      - HOSTNAME=0.0.0.0
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
