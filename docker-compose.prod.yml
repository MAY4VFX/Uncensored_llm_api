version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://unchained:unchained@unchained-postgres-vpmi0z:5432/unchained
      - DATABASE_URL_SYNC=postgresql://unchained:unchained@unchained-postgres-vpmi0z:5432/unchained
      - REDIS_URL=redis://:882zuscbues110d3@unchained-redis-h4oqtz:6379/0
    networks:
      - dokploy-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  scout:
    build:
      context: ./scout
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL_SYNC=postgresql://unchained:unchained@unchained-postgres-vpmi0z:5432/unchained
      - HTTPS_PROXY=http://192.168.2.140:8118
      - HTTP_PROXY=http://192.168.2.140:8118
      - NO_PROXY=unchained-postgres-vpmi0z,unchained-redis-h4oqtz,localhost,127.0.0.1,192.168.2.140
    networks:
      - dokploy-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://192.168.2.140:8010
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
